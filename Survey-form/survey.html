<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
    <link href="survey.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="title">Survey Form</h1>
      <p id="description">Thank you for taking the time to help us</p>
    </header>
    <form id="survey-form">
      <div class="form-group">
        <label id="name-label" for="name">Name</label>
        <input class="form-control" id="name" type="text" placeholder="Enter your name" required/> 
      </div>
      
      <div class="form-group">
        <label id="email-label" for="email">Email</label>
        <input class="form-control" id="email" type="email" placeholder="Enter your Email" required/>
      </div>
      
      <div class="form-group">
        <label id="number-label" for="number">Age (optional)</label>
        <input class="form-control" id="number" type="number" min="10" max="100" placeholder="Age"/>
      </div>
      
      <div class="form-group">
        <label>Which option best describes your current role?</label>
        <select id="dropdown" class="form-control">
          <option disabled selected value>Select current role</option>
          <option value="student">Student</option>
          <option value="full-time-job">Full Time Job</option>
          <option value="full-time-learner">Full Time Learner</option>
          <option value="prefer-not-to-say">Prefer not to say</option>
          <option value="other">Other</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Would you recommend us to a friend?</label>
        <label class="radio-label"><input type="radio" name="recommend" value="definitely" class="input-radio"/> Definitely</label>
        <label class="radio-label"><input type="radio" name="recommend" value="maybe" class="input-radio"/> Maybe</label>
        <label class="radio-label"><input type="radio" name="recommend" value="not-sure" class="input-radio"/> Not sure</label>
      </div>
      
      <div class="form-group">
        <label>What is your favorite feature of our?</label>
        <select id="most-like" class="form-control">
          <option disabled selected value>Select an option</option>
          <option value="challenges">Challenges</option>
          <option value="projects">Projects</option>
          <option value="community">Community</option>
          <option value="open-source">Open Source</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>What would you like to see improved? <span>(Check all that apply)</span></label>
        <label class="checkbox-label"><input type="checkbox" value="front-end-projects" class="input-checkbox"/> Front-end Projects</label>
        <label class="checkbox-label"><input type="checkbox" value="back-end-projects" class="input-checkbox"/> Back-end Projects</label>
        <label class="checkbox-label"><input type="checkbox" value="data-visualization" class="input-checkbox"/> Data Visualization</label>
        <label class="checkbox-label"><input type="checkbox" value="challenges" class="input-checkbox"/> Challenges</label>
        <label class="checkbox-label"><input type="checkbox" value="open-source-community" class="input-checkbox"/> Open Source Community</label>
        <label class="checkbox-label"><input type="checkbox" value="gitter-help-rooms" class="input-checkbox"/> Gitter help rooms</label>
        <label class="checkbox-label"><input type="checkbox" value="videos" class="input-checkbox"/> Videos</label>
        <label class="checkbox-label"><input type="checkbox" value="city-meetups" class="input-checkbox"/> City Meetups</label>
        <label class="checkbox-label"><input type="checkbox" value="wiki" class="input-checkbox"/> Wiki</label>
        <label class="checkbox-label"><input type="checkbox" value="forum" class="input-checkbox"/> Forum</label>
        <label class="checkbox-label"><input type="checkbox" value="additional-courses" class="input-checkbox"/> Additional Courses</label>
      </div>
      
      <div class="form-group">
        <label for="comments">Any comments or suggestions?</label>
        <textarea id="comments" class="input-textarea" placeholder="Enter your comments here..."></textarea>
      </div>
      
      <div class="form-group">
        <button type="submit" id="submit" class="submit-button">Submit</button>
      </div>
    </form>
  </div>
</body>
</html>
